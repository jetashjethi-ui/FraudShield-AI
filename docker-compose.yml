version: '3.8'

services:
  # Main Dashboard
  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    environment:
      - STREAMLIT_THEME_BASE=dark
    restart: unless-stopped

  # FastAPI Backend
  api:
    build: .
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
    restart: unless-stopped
