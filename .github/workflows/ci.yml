name: FraudShield AI CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ci-v2
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx
          pip install numpy pandas scikit-learn
          pip install fastapi uvicorn pydantic
          pip install xgboost lightgbm catboost
          pip install streamlit plotly shap optuna joblib
          pip install networkx scipy
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytorch-tabnet
          pip install fpdf2

      - name: Syntax check
        run: |
          python -c "
          import ast, os, sys
          errors = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('.git', '__pycache__', 'catboost_info')]
              for f in files:
                  if f.endswith('.py'):
                      try:
                          ast.parse(open(os.path.join(root, f)).read())
                      except SyntaxError as e:
                          errors.append(f'{os.path.join(root, f)}: {e}')
          if errors:
              for e in errors: print(e)
              sys.exit(1)
          print('All Python files OK')
          "

      - name: Run tests
        run: pytest tests/ -v --tb=short
